name: SreeBase CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  build-cli:
    name: Build CLI (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: sreebase-cli-linux
            binary_path: dist/sreebase-cli
          - os: windows-latest
            artifact_name: sreebase-cli-windows
            binary_path: dist/sreebase-cli.exe
          - os: macos-latest
            artifact_name: sreebase-cli-macos
            binary_path: dist/sreebase-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build CLI binary
        run: pyinstaller --onefile --name sreebase-cli sreebase/client/cli.py

      - name: Verify binary exists (Unix)
        if: runner.os != 'Windows'
        run: ls -lh ${{ matrix.binary_path }}

      - name: Verify binary exists (Windows)
        if: runner.os == 'Windows'
        run: dir ${{ matrix.binary_path }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
