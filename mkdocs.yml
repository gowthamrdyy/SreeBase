site_name: SreeBase
site_description: Learn SreeBase, a lightweight educational document database with a bracketless query language.
site_author: "Gowtham Reddy"
repo_url: "https://github.com/gowthamrdyy/sreebase"
site_url: "https://gowthamrdyy.github.io/SreeBase/"

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.top
    - navigation.instant
    - toc.integrate
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    logo: material/database

nav:
  - Home: index.md
  - FAQ & Troubleshooting: faq.md
  - Future Roadmap: roadmap.md
  - About Me: about.md
  - Get Started:
      - tutorials/index.md
      - Installation: tutorials/installation.md
      - First Database: tutorials/first-database.md
      - Core Concepts: tutorials/concepts.md
  - Query Language:
      - syntax.md
      - Insert Data: tutorials/insert.md
      - Read Data: tutorials/read.md
      - Update Data: tutorials/update.md
      - Delete Data: tutorials/delete.md
      - Aggregations: tutorials/aggregations.md
      - Indexes: tutorials/indexes.md
  - Build Apps:
      - Python SDK: api.md
      - Example App: tutorials/example-app.md
  - Operations:
      - Admin and Security: tutorials/security.md
      - Storage Engine: tutorials/storage.md
      - Troubleshooting: tutorials/troubleshooting.md
  - Reference:
      - Cheat Sheet: tutorials/cheat-sheet.md

markdown_extensions:
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - pymdownx.details

extra_css:
  - stylesheets/extra.css
